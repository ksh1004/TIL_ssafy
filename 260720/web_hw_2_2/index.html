<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .card { /* card 클래스에 대한 스타일 설정 */
      display: flex; /* flexbox를 사용하여 요소들을 배치 */
      flex-direction: column; /* 세로 방향으로 배치 */
      padding: 20px; /* padding : 콘텐츠 주위 공백 설정 */

      width: 300px; /* width : 카드의 너비 설정 */
      height: 600px; /* height : 카드의 높이 설정 */
      border: 2px solid black; /* border : 카드의 테두리 설정 */
    }
    img { /* img 태그에 대한 스타일 설정 */
      width: 100%; /* width : 이미지의 너비를 부모 요소에 맞춤 */
      height: 100%; /* height : 이미지의 높이를 부모 요소에 맞춤 */
      display: block; /* display : 이미지가 블록 요소로 표시되도록 설정 */
    }
    .profile { /* profile 클래스에 대한 스타일 설정 */
      position : relative; /* position : 요소의 위치를 상대적으로 설정 */
      width: 100%; /* width : 부모 요소에 맞춤 */
      overflow: hidden; /* overflow : 자식 요소가 부모 요소를 벗어날 경우 숨김 처리 */
      text-align: center; /* text-align : 텍스트를 가운데 정렬 */
    }
    .profile p { /* profile 클래스 내부의 p 태그에 대한 스타일 설정 */
      position: absolute; /* position : 요소의 위치를 절대적으로 설정 */
      bottom: 0px; /* bottom : 요소를 부모 요소의 아래쪽에 위치시킴 */
      margin: 0px; /* margin : 요소의 외부 여백을 0으로 설정 */
      width: 100%; /* width : 부모 요소에 맞춤 */
      padding: 10px; /* padding : 콘텐츠 주위 공백 설정 */
      background-color: rgb(255, 145, 0); /* background-color : 배경색 설정 */
      opacity: 0.6; /* opacity : 요소의 투명도 설정 */
      color: black; /* color : 텍스트 색상 설정 */
      font-weight: bold; /* font-weight : 텍스트를 굵게 설정 */
      font-size: 20px; /* font-size : 텍스트 크기 설정 */
    }

  </style>
</head>
<body>
  <div class="card">
    <div class="profile">
      <img src="image.png" alt="프로필 이미지">
      <p>Name</p>
    </div>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Adipisci unde officiis ad nostrum. Laboriosam mollitia similique provident fuga tenetur saepe sit, amet eaque neque eius quaerat expedita ea illum veniam.</p>
  </div>
</body>
</html>
