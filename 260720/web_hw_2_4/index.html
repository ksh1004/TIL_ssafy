<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
  /* 자손 결합자는 공백으로 표기하고, 첫 번째 요소의 모든 자손 요소들을 선택한다 */
  /* 자식 결합자는 >으로 표기하고, 첫 번째 요소의 직계 자식만 선택한다 */
    div p {
      color: blue;
      font-size: 20px;
    }
    div > p {
      color: crimson;
      font-size: 20px;
    }
    section p{
      margin-left: 30px; /* section의 자식 p태그에만 적용됨 */
    }
  </style>
</head> 
<body>
  <div>
    <p>자식</p> 
    
    <section>
      <p>손자</p>
    </section>

    <p>자식</p>
  </div>
</body>
</html>
