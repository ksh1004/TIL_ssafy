<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business card
    </title>
</head>
<style>
    .card-box {
        width: 400px; /* 카드의 너비 */
        height: 220px; /* 카드의 높이 */
        border: 1px solid #000; /* 카드의 테두리 */
        margin: 0px auto 0px auto; /* 카드의 위치 */
    }
</style>
<body>
 
<div class="card-box">
    <img src="profile.png" alt="Logo" width="100" height="100">
    <h1>홍길동</h1>
    <p>Front-End Developer, Example</p>
    <p>서울시 강남구 테헤란로 1234</p>
    <p>02-123-4567</p>
</div>

</body>
</html>
